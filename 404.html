<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>StorageApp</title>
  <script>
    // Solution routing SPA sur GitHub Pages
    // Redirige /boxes/123 → /?/boxes/123 pour que index.html prenne le relais
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
